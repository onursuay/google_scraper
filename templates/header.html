<script src="/static/app_i18n.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
* { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

/* ── Global gradient body ── */
body {
    background: linear-gradient(160deg, #d1fae5 0%, #f0fdf4 30%, #f8fafc 65%, #eff6ff 100%);
    background-attachment: fixed;
    color: #111827;
}

/* ══ SIDEBAR LAYOUT ══ */
#mainSidebar {
    position: fixed; top: 0; left: 0; height: 100vh; z-index: 1000;
    background: #fff; border-right: 1px solid #e5e7eb;
    display: flex; flex-direction: column;
    width: 260px; transition: width 0.3s ease;
    overflow: hidden;
}
body.sn-collapsed #mainSidebar { width: 72px; }

body { padding-left: 260px; transition: padding-left 0.3s ease; }
body.sn-collapsed { padding-left: 72px; }

/* ── Header / Logo ── */
.sn-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; border-bottom: 1px solid #e5e7eb;
    min-height: 56px; flex-shrink: 0;
}
body.sn-collapsed .sn-header { justify-content: center; padding: 6px; }

/* Expanded state: logo + close button */
.sn-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; min-width: 0; }
.sn-logo img { width: 34px; height: 34px; border-radius: 8px; flex-shrink: 0; }
body.sn-collapsed .sn-logo { display: none; }

.sn-toggle-close {
    padding: 6px; border-radius: 8px; background: none; border: none;
    cursor: pointer; color: #6b7280; transition: background 0.15s; flex-shrink: 0;
}
.sn-toggle-close:hover { background: #f3f4f6; color: #374151; }
.sn-toggle-close svg { width: 18px; height: 18px; display: block; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
body.sn-collapsed .sn-toggle-close { display: none; }

/* Collapsed state: logo img + expand button overlaid, hover reveals button */
.sn-header-collapsed {
    position: relative; width: 44px; height: 44px;
    display: none;
}
body.sn-collapsed .sn-header-collapsed { display: flex; }
.sn-header-coll-logo,
.sn-header-coll-btn {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    border-radius: 8px; transition: opacity 0.2s;
}
.sn-header-coll-logo { opacity: 1; }
.sn-header-coll-logo img { width: 32px; height: 32px; border-radius: 6px; }
.sn-header-coll-btn {
    opacity: 0; background: none; border: none;
    cursor: pointer; color: #2BB673;
}
.sn-header-coll-btn svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.sn-header-collapsed:hover .sn-header-coll-logo { opacity: 0; }
.sn-header-collapsed:hover .sn-header-coll-btn { opacity: 1; background: #f0fdf4; }

/* ── Navigation ── */
.sn-nav {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    padding: 10px 8px; display: flex; flex-direction: column; gap: 2px;
}
.sn-nav::-webkit-scrollbar { width: 3px; }
.sn-nav::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 2px; }

.sn-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px; border-radius: 8px;
    font-size: 13px; font-weight: 500; color: #374151;
    text-decoration: none; cursor: pointer;
    transition: background 0.15s, color 0.15s;
    width: 100%; background: none; border: none; font-family: inherit;
    white-space: nowrap; overflow: hidden; text-align: left;
}
.sn-item:hover { background: #f9fafb; color: #111827; }
.sn-item.active { background: rgba(43,182,115,0.1); color: #2BB673; }
.sn-item.active .sn-icon { color: #2BB673; }
.sn-icon { width: 18px; height: 18px; flex-shrink: 0; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; color: #9ca3af; }
body.sn-collapsed .sn-item { justify-content: center; padding: 10px; }
body.sn-collapsed .sn-item-label { display: none; }

/* ── User profile ── */
.sn-user-sect {
    border-top: 1px solid #e5e7eb; padding: 8px; flex-shrink: 0; position: relative;
}
.sn-user-btn {
    display: flex; align-items: center; gap: 10px; width: 100%;
    padding: 8px 10px; border-radius: 10px; background: none; border: none;
    cursor: pointer; font-family: inherit; transition: background 0.15s;
}
.sn-user-btn:hover { background: #f9fafb; }
body.sn-collapsed .sn-user-btn { justify-content: center; }
.sn-user-av {
    width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
    background: #2BB673; display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: #fff;
}
.sn-user-info { text-align: left; flex: 1; min-width: 0; overflow: hidden; }
.sn-user-name { font-size: 12px; font-weight: 600; color: #111827; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sn-user-plan { font-size: 11px; color: #2BB673; font-weight: 500; }
body.sn-collapsed .sn-user-info { display: none; }

/* User dropdown */
.sn-user-drop {
    display: none; position: absolute; z-index: 2000;
    background: #fff; border: 1px solid #e5e7eb;
    border-radius: 12px; padding: 4px 0; min-width: 220px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
}
body:not(.sn-collapsed) .sn-user-drop { bottom: calc(100% + 4px); left: 8px; }
body.sn-collapsed .sn-user-drop { bottom: 0; left: calc(100% + 8px); }
.sn-user-sect.open .sn-user-drop { display: block; }

.snd-head { padding: 10px 14px 12px; border-bottom: 1px solid #f3f4f6; }
.snd-name { font-size: 12px; font-weight: 600; color: #111827; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.snd-email { font-size: 11px; color: #9ca3af; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.snd-sep { height: 1px; background: #f3f4f6; margin: 2px 0; }
.snd-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 14px; font-size: 13px; color: #374151;
    text-decoration: none; transition: background 0.12s;
    background: none; border: none; width: 100%; font-family: inherit;
    text-align: left; cursor: pointer;
}
.snd-item:hover { background: #f9fafb; }
.snd-item svg { width: 14px; height: 14px; color: #9ca3af; flex-shrink: 0; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.snd-logout { color: #ef4444; }
.snd-logout:hover { background: #fef2f2; }
.snd-logout svg { color: #ef4444; }
.snd-lang-sub { padding: 2px 0 2px 38px; }
.snd-lang-btn {
    width: 100%; text-align: left; padding: 7px 14px; font-size: 12px;
    color: #6b7280; background: none; border: none; cursor: pointer; font-family: inherit;
    border-radius: 4px; transition: background 0.1s;
}
.snd-lang-btn:hover { background: #f9fafb; color: #374151; }

/* ── Scan status bar ── */
.scan-badge {
    display: none; width: 8px; height: 8px; background: #22c55e;
    border-radius: 50%; animation: scanPulse 1s ease-in-out infinite; margin-left: 4px;
}
.scan-badge.active { display: inline-block; }
@keyframes scanPulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34,197,94,0.5); }
    50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(34,197,94,0); }
}
.scan-status-bar {
    display: none; position: fixed; bottom: 0; left: 260px; right: 0;
    background: #fff; border-top: 1px solid #e5e7eb;
    padding: 8px 32px; font-size: 12px; color: #6b7280; z-index: 998;
    align-items: center; gap: 12px; transition: left 0.3s;
    box-shadow: 0 -2px 8px rgba(0,0,0,0.06);
}
body.sn-collapsed .scan-status-bar { left: 72px; }
.scan-status-bar.active { display: flex; }
.scan-status-bar .mini-progress { flex: 1; max-width: 200px; height: 4px; background: #e5e7eb; border-radius: 2px; overflow: hidden; }
.scan-status-bar .mini-progress-fill { height: 100%; background: #22c55e; border-radius: 2px; transition: width 0.3s; }
.scan-status-bar a { color: #3b82f6; text-decoration: none; font-weight: 600; margin-left: auto; }
</style>

<!-- ═══ SIDEBAR ═══ -->
<div id="mainSidebar">

    <!-- Header -->
    <div class="sn-header">
        <!-- Expanded: logo + close button -->
        <a href="/dashboard" class="sn-logo">
            <img src="/static/logo.png" alt="Yo Scraper">
        </a>
        <button class="sn-toggle-close" onclick="toggleMainSidebar()" title="Daralt">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/><polyline points="14 8 9 13 14 18"/></svg>
        </button>

        <!-- Collapsed: logo fades out on hover, expand button fades in -->
        <div class="sn-header-collapsed">
            <a href="/dashboard" class="sn-header-coll-logo">
                <img src="/static/logo.png" alt="Yo Scraper">
            </a>
            <button class="sn-header-coll-btn" onclick="toggleMainSidebar()" title="Genişlet">
                <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/><polyline points="10 8 15 13 10 18"/></svg>
            </button>
        </div>
    </div>

    <!-- Nav -->
    <nav class="sn-nav">

        <a href="/dashboard" class="sn-item" id="snv-dashboard" title="Genel Bakış">
            <svg class="sn-icon" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
            <span class="sn-item-label">Genel Bakış</span>
        </a>

        <a href="/clickbot" class="sn-item" id="snv-clickbot" title="Click Bot">
            <svg class="sn-icon" viewBox="0 0 24 24"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/><path d="M13 13l6 6"/></svg>
            <span class="sn-item-label" data-i18n="nav-clickbot-lbl">Click Bot</span>
        </a>

        <a href="/app" class="sn-item" id="snv-scanner" title="Tarayıcı">
            <svg class="sn-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <span class="sn-item-label" data-i18n="nav-scanner-lbl">Tarayıcı</span>
        </a>

        <a href="/external" class="sn-item" id="snv-external" title="İçe Aktarma">
            <svg class="sn-icon" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
            <span class="sn-item-label" data-i18n="nav-external-lbl">İçe Aktarma</span>
        </a>

        <a href="/database" class="sn-item" id="snv-database" title="Veritabanı">
            <svg class="sn-icon" viewBox="0 0 24 24"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
            <span class="sn-item-label" data-i18n="nav-database-lbl">Veritabanı</span>
        </a>

        <a href="/marketing" class="sn-item" id="snv-marketing" title="Pazarlama">
            <svg class="sn-icon" viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
            <span class="sn-item-label" data-i18n="mkt-nav">Pazarlama</span>
        </a>

    </nav>

    <!-- User profile -->
    {% if current_user %}
    <div class="sn-user-sect" id="snUserSect">
        <button class="sn-user-btn" onclick="toggleSnUser(event)">
            <div class="sn-user-av">{{ current_user.initials }}</div>
            <div class="sn-user-info">
                <div class="sn-user-name">{{ current_user.full_name }}</div>
                <div class="sn-user-plan">Free</div>
            </div>
        </button>
        <div class="sn-user-drop" id="snUserDrop">
            <div class="snd-head">
                <p class="snd-name">{{ current_user.full_name }}</p>
                <p class="snd-email">{{ current_user.email }}</p>
            </div>
            <div style="padding:4px 0;">
                <a href="/account" class="snd-item">
                    <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    Hesabım
                </a>
                <a href="/faturalarim" class="snd-item">
                    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                    Faturalarım
                </a>
                <a href="/abonelik" class="snd-item">
                    <svg viewBox="0 0 24 24"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
                    Abonelik
                </a>
                <a href="/yardim" class="snd-item">
                    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                    Yardım Merkezi
                </a>
            </div>
            <div class="snd-sep"></div>
            <div style="padding:4px 0;">
                <button class="snd-item" style="justify-content:space-between;" onclick="toggleSnLang(event)">
                    <span style="display:flex;align-items:center;gap:10px;">
                        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 010 20M12 2a15.3 15.3 0 000 20"/></svg>
                        Dil
                    </span>
                    <svg id="snLangChev" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="transition:transform 0.2s;flex-shrink:0;"><polyline points="9 18 15 12 9 6"/></svg>
                </button>
                <div id="snLangSub" style="display:none;" class="snd-lang-sub">
                    <button class="snd-lang-btn" onclick="setAppLang('tr');document.getElementById('snLangSub').style.display='none';">Türkçe</button>
                    <button class="snd-lang-btn" onclick="setAppLang('en');document.getElementById('snLangSub').style.display='none';">English</button>
                </div>
            </div>
            <div class="snd-sep"></div>
            <div style="padding:4px 0;">
                <a href="/logout" class="snd-item snd-logout">
                    <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    Çıkış Yap
                </a>
            </div>
        </div>
    </div>
    {% endif %}

</div>

<!-- Scan status bar -->
<div class="scan-status-bar" id="scanStatusBar">
    <span class="scan-badge active" style="display:inline-block"></span>
    <span id="scanBarText" data-i18n="h-scanning">Taranıyor...</span>
    <div class="mini-progress"><div class="mini-progress-fill" id="scanBarProgress" style="width:0%"></div></div>
    <span id="scanBarCount">0/0</span>
    <a href="/app" data-i18n="h-go-scanner">Scanner'a Git →</a>
</div>

<script>
// ── Sidebar state ──
(function() {
    if (localStorage.getItem('sn_collapsed') === '1') {
        document.body.classList.add('sn-collapsed');
    }
})();

function toggleMainSidebar() {
    const collapsed = document.body.classList.toggle('sn-collapsed');
    localStorage.setItem('sn_collapsed', collapsed ? '1' : '0');
}

// ── Active nav ──
(function() {
    const path = location.pathname;
    const map = {
        '/dashboard': 'snv-dashboard',
        '/clickbot': 'snv-clickbot',
        '/app': 'snv-scanner',
        '/external': 'snv-external',
        '/database': 'snv-database',
        '/domains': 'snv-database',
        '/marketing': 'snv-marketing',
    };
    let id = map[path];
    if (!id && path.startsWith('/marketing')) id = 'snv-marketing';
    if (id) {
        const el = document.getElementById(id);
        if (el) el.classList.add('active');
    }
})();

// ── User dropdown ──
function toggleSnUser(e) {
    e.stopPropagation();
    document.getElementById('snUserSect').classList.toggle('open');
}
function toggleSnLang(e) {
    e.stopPropagation();
    const sub = document.getElementById('snLangSub');
    const chev = document.getElementById('snLangChev');
    const open = sub.style.display === 'none';
    sub.style.display = open ? 'block' : 'none';
    chev.style.transform = open ? 'rotate(90deg)' : '';
}
document.addEventListener('click', function(e) {
    const w = document.getElementById('snUserSect');
    if (w && !w.contains(e.target)) w.classList.remove('open');
});

// ── Global scan status watcher ──
(function globalScanWatch() {
    const bar = document.getElementById('scanStatusBar');
    function checkScan() {
        fetch('/api/status').then(r => r.json()).then(data => {
            if (data.running) {
                if (location.pathname !== '/app') {
                    bar.classList.add('active');
                    document.getElementById('scanBarText').textContent = data.status.substring(0, 60);
                    const pct = data.total > 0 ? (data.progress / data.total * 100) : 0;
                    document.getElementById('scanBarProgress').style.width = pct + '%';
                    document.getElementById('scanBarCount').textContent = data.results.length + ' ' + t('h-found', 'bulundu');
                } else { bar.classList.remove('active'); }
            } else { bar.classList.remove('active'); }
        }).catch(() => {});
    }
    const interval = location.pathname === '/clickbot' ? 10000 : 2000;
    setInterval(checkScan, interval);
    checkScan();
})();

</script>
