<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/static/logo.png">
    <script src="/static/app_i18n.js"></script>
    <title>Sign In — Yo Scraper</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #060609; color: #fff;
            min-height: 100vh; overflow-x: hidden;
        }
        .page-wrap {
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 24px 16px; position: relative; overflow: hidden;
        }
        canvas {
            position: absolute; inset: 0; width: 100%; height: 100%;
            pointer-events: none;
        }
        .card-wrap { width: 100%; max-width: 380px; position: relative; z-index: 10; }
        .logo-wrap { display: flex; justify-content: center; margin-bottom: 20px; }
        .logo-wrap a { display: block; }
        .logo-wrap img { width: 56px; height: 56px; border-radius: 14px; }

        .card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.10);
            border-radius: 20px; padding: 32px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .card h1 { font-size: 24px; font-weight: 700; color: #fff; text-align: center; margin-bottom: 8px; }
        .card .subtitle { font-size: 14px; color: #9ca3af; text-align: center; margin-bottom: 24px; }

        .error-box {
            margin-bottom: 24px; border-radius: 10px;
            background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2);
            padding: 12px 16px;
        }
        .error-box p { font-size: 14px; color: #f87171; }

        .field { margin-bottom: 20px; }
        .field label { display: block; font-size: 14px; font-weight: 500; color: #d1d5db; margin-bottom: 6px; }
        .field input {
            width: 100%; border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.10);
            background: rgba(255,255,255,0.04);
            padding: 9px 12px; font-size: 14px; color: #fff;
            font-family: inherit; outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .field input::placeholder { color: #6b7280; }
        .field input:focus {
            border-color: rgba(16,185,129,0.5);
            box-shadow: 0 0 0 3px rgba(16,185,129,0.15);
        }

        .submit-btn {
            width: 100%; padding: 10px 16px;
            border-radius: 10px; border: none; cursor: pointer;
            background: linear-gradient(90deg, #10b981, #14b8a6);
            color: #000; font-size: 14px; font-weight: 600;
            font-family: inherit;
            box-shadow: 0 8px 24px rgba(16,185,129,0.2);
            transition: all 0.2s;
        }
        .submit-btn:hover { background: linear-gradient(90deg, #059669, #0f766e); }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .register-link { margin-top: 24px; text-align: center; }
        .register-link p { font-size: 14px; color: #6b7280; }
        .register-link a { color: #34d399; text-decoration: none; font-weight: 500; transition: color 0.2s; }
        .register-link a:hover { color: #6ee7b7; }

        .back-link { margin-top: 20px; text-align: center; }
        .back-link a { font-size: 14px; color: #6b7280; text-decoration: none; transition: color 0.2s; }
        .back-link a:hover { color: #34d399; }

        .footer-legal {
            position: absolute; bottom: 16px; left: 0; right: 0;
            display: flex; flex-wrap: wrap; justify-content: center; gap: 16px; padding: 0 16px;
        }
        .footer-legal a { font-size: 12px; color: #374151; text-decoration: none; transition: color 0.2s; }
        .footer-legal a:hover { color: #9ca3af; }
    </style>
</head>
<body>
<div class="page-wrap">
    <canvas id="bgCanvas" aria-hidden="true"></canvas>

    <div class="card-wrap">
        <div class="logo-wrap">
            <a href="/"><img src="/static/logo.png" alt="Yo Scraper"></a>
        </div>

        <div class="card">
            <h1 data-i18n="login-title">Giriş Yap</h1>
            <p class="subtitle" data-i18n="login-subtitle">Yo Scraper hesabınıza giriş yapın</p>

            <div class="error-box" id="errorBox" style="display:none;">
                <p id="errorMsg"></p>
            </div>

            <form id="loginForm">
                <div class="field">
                    <label for="email" data-i18n="email-label">E-posta</label>
                    <input type="email" id="email" name="email" placeholder="ornek@sirket.com" data-i18n-ph="email-ph" autocomplete="email">
                </div>
                <div class="field">
                    <label for="password" data-i18n="pw-label">Şifre</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password">
                </div>
                <button type="submit" class="submit-btn" id="submitBtn" data-i18n="login-btn">Giriş Yap</button>
            </form>

            <div class="register-link">
                <p><span data-i18n="no-account">Hesabınız yok mu?</span> <a href="/register" data-i18n="reg-link">Kayıt Ol</a></p>
            </div>
        </div>

        <div class="back-link">
            <a href="/" data-i18n="back-home">← Ana Sayfaya Dön</a>
        </div>
    </div>

    <div class="footer-legal">
        <a href="/en/privacy-policy">Privacy Policy</a>
        <a href="/en/terms-of-service">Terms of Service</a>
    </div>
</div>

<script>
// Canvas network animation
(function() {
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    let w, h, animId;
    const nodes = [];
    const pulses = [];

    function resize() {
        w = canvas.width = canvas.offsetWidth;
        h = canvas.height = canvas.offsetHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    for (let i = 0; i < 35; i++) {
        nodes.push({
            x: Math.random() * (w || 800),
            y: Math.random() * (h || 600),
            vx: (Math.random() - 0.5) * 0.3,
            vy: (Math.random() - 0.5) * 0.3,
            r: Math.random() * 2 + 1.5
        });
    }

    function draw() {
        ctx.clearRect(0, 0, w, h);

        for (const n of nodes) {
            n.x += n.vx; n.y += n.vy;
            if (n.x < 0 || n.x > w) n.vx *= -1;
            if (n.y < 0 || n.y > h) n.vy *= -1;
            n.x = Math.max(0, Math.min(w, n.x));
            n.y = Math.max(0, Math.min(h, n.y));
        }

        for (let i = 0; i < nodes.length; i++) {
            for (let j = i + 1; j < nodes.length; j++) {
                const dx = nodes[i].x - nodes[j].x;
                const dy = nodes[i].y - nodes[j].y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 180) {
                    const alpha = (1 - dist / 180) * 0.35;
                    ctx.beginPath();
                    ctx.moveTo(nodes[i].x, nodes[i].y);
                    ctx.lineTo(nodes[j].x, nodes[j].y);
                    ctx.strokeStyle = 'rgba(255,255,255,' + alpha + ')';
                    ctx.lineWidth = 0.8;
                    ctx.stroke();
                    if (Math.random() < 0.008 && pulses.length < 15) {
                        pulses.push({ from: i, to: j, t: 0, speed: 0.008 + Math.random() * 0.008 });
                    }
                }
            }
        }

        for (let p = pulses.length - 1; p >= 0; p--) {
            const pulse = pulses[p];
            pulse.t += pulse.speed;
            if (pulse.t > 1) { pulses.splice(p, 1); continue; }
            const from = nodes[pulse.from], to = nodes[pulse.to];
            const px = from.x + (to.x - from.x) * pulse.t;
            const py = from.y + (to.y - from.y) * pulse.t;
            const glow = Math.sin(pulse.t * Math.PI);
            ctx.beginPath();
            ctx.arc(px, py, 2, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(16,185,129,' + (glow * 0.8) + ')';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(px, py, 5, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(16,185,129,' + (glow * 0.2) + ')';
            ctx.fill();
        }

        for (const n of nodes) {
            ctx.beginPath();
            ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,0.25)';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(n.x, n.y, n.r + 3, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,0.03)';
            ctx.fill();
        }

        animId = requestAnimationFrame(draw);
    }
    draw();
})();

// Login form
document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errorBox = document.getElementById('errorBox');
    const errorMsg = document.getElementById('errorMsg');
    const btn = document.getElementById('submitBtn');

    errorBox.style.display = 'none';
    if (!email || !password) {
        errorMsg.textContent = t('login-email-req', 'E-posta ve şifre gereklidir.');
        errorBox.style.display = 'block';
        return;
    }

    btn.disabled = true;
    btn.textContent = t('login-signing-in', 'Giriş yapılıyor...');

    try {
        const res = await fetch('/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (res.ok && data.success) {
            window.location.href = '/app';
        } else {
            errorMsg.textContent = data.error || t('login-err', 'Giriş bilgileri hatalı.');
            errorBox.style.display = 'block';
            btn.disabled = false;
            btn.textContent = t('login-btn', 'Giriş Yap');
        }
    } catch (err) {
        errorMsg.textContent = t('login-retry', 'Bir hata oluştu. Lütfen tekrar deneyin.');
        errorBox.style.display = 'block';
        btn.disabled = false;
        btn.textContent = t('login-btn', 'Giriş Yap');
    }
});
</script>
</body>
</html>
