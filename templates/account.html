<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/static/logo.png">
    <title>Hesabım — Yo Scraper</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
{% include 'header.html' %}

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #0b1120; color: #f1f5f9; min-height: 100vh; }

.acc-page { max-width: 720px; margin: 0 auto; padding: 48px 24px 120px; }
.acc-title { font-size: 22px; font-weight: 700; color: #f1f5f9; margin-bottom: 32px; display: flex; align-items: center; gap: 10px; }
.acc-title svg { color: #64748b; }

.acc-card {
    background: #111827; border: 1px solid #1e293b;
    border-radius: 16px; margin-bottom: 20px; overflow: hidden;
}
.acc-card-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 24px 16px; border-bottom: 1px solid #1e293b;
}
.acc-card-head h2 { font-size: 15px; font-weight: 600; color: #e2e8f0; display: flex; align-items: center; gap: 8px; }
.acc-card-head h2 svg { color: #64748b; }
.acc-card-body { padding: 24px; }

/* Profile avatar row */
.profile-hero { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
.profile-av-lg {
    width: 64px; height: 64px; border-radius: 50%; flex-shrink: 0;
    background: linear-gradient(135deg, #10b981, #0891b2);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: 700; color: #fff;
}
.profile-av-info .name { font-size: 18px; font-weight: 700; color: #f1f5f9; }
.profile-av-info .email { font-size: 13px; color: #64748b; margin-top: 3px; }
.profile-av-info .joined { font-size: 12px; color: #475569; margin-top: 4px; }

/* Form */
.form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 540px) { .form-grid-2 { grid-template-columns: 1fr; } }
.field { display: flex; flex-direction: column; gap: 6px; }
.field label { font-size: 13px; font-weight: 500; color: #94a3b8; }
.field input, .field input[readonly] {
    background: #0b1120; border: 1px solid #1e293b; border-radius: 10px;
    padding: 10px 14px; font-size: 14px; color: #f1f5f9; font-family: inherit;
    outline: none; transition: border-color 0.2s, box-shadow 0.2s;
}
.field input[readonly] { color: #64748b; cursor: default; }
.field input:not([readonly]):focus {
    border-color: rgba(16,185,129,0.5);
    box-shadow: 0 0 0 3px rgba(16,185,129,0.12);
}
.field-full { grid-column: 1 / -1; }

.toast {
    display: none; padding: 10px 16px; border-radius: 10px; font-size: 13px;
    font-weight: 500; margin-top: 16px;
}
.toast.success { background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.3); color: #34d399; }
.toast.error   { background: rgba(239,68,68,0.1);   border: 1px solid rgba(239,68,68,0.25); color: #f87171; }

.save-btn {
    display: inline-flex; align-items: center; gap: 7px;
    background: linear-gradient(90deg, #10b981, #14b8a6);
    border: none; border-radius: 10px; padding: 10px 22px;
    font-size: 14px; font-weight: 600; color: #000; cursor: pointer;
    font-family: inherit; transition: opacity 0.2s; margin-top: 20px;
}
.save-btn:hover { opacity: 0.9; }
.save-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.danger-zone { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
.danger-zone p { font-size: 13px; color: #64748b; }
.danger-zone p strong { color: #e2e8f0; }
</style>

<div class="acc-page">
    <div class="acc-title">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Hesabım
    </div>

    <!-- Profile card -->
    <div class="acc-card">
        <div class="acc-card-head">
            <h2>
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                Profil Bilgileri
            </h2>
        </div>
        <div class="acc-card-body">
            <div class="profile-hero">
                <div class="profile-av-lg">{{ user.initials }}</div>
                <div class="profile-av-info">
                    <div class="name">{{ user.full_name }}</div>
                    <div class="email">{{ user.email }}</div>
                    {% if user.created_at %}
                    <div class="joined">Katılım: {{ user.created_at[:10] }}</div>
                    {% endif %}
                </div>
            </div>

            <form id="profileForm">
                <div class="form-grid-2">
                    <div class="field field-full">
                        <label>E-posta</label>
                        <input type="email" value="{{ user.email }}" readonly>
                    </div>
                    <div class="field field-full">
                        <label>Ad Soyad</label>
                        <input type="text" id="fullName" value="{{ user.full_name }}" placeholder="Ad Soyad" maxlength="80">
                    </div>
                    <div class="field">
                        <label>Şirket</label>
                        <input type="text" id="company" value="{{ user.company or '' }}" placeholder="Şirket adı">
                    </div>
                    <div class="field">
                        <label>Telefon</label>
                        <input type="tel" id="phone" value="{{ user.phone or '' }}" placeholder="+90 555 000 00 00">
                    </div>
                </div>
                <div class="toast" id="profileToast"></div>
                <button type="submit" class="save-btn" id="profileBtn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                    Kaydet
                </button>
            </form>
        </div>
    </div>

    <!-- Password card -->
    <div class="acc-card">
        <div class="acc-card-head">
            <h2>
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                Şifre Değiştir
            </h2>
        </div>
        <div class="acc-card-body">
            <form id="passwordForm">
                <div class="form-grid-2">
                    <div class="field field-full">
                        <label>Mevcut Şifre</label>
                        <input type="password" id="curPw" placeholder="Mevcut şifreniz" autocomplete="current-password">
                    </div>
                    <div class="field">
                        <label>Yeni Şifre</label>
                        <input type="password" id="newPw" placeholder="En az 8 karakter" autocomplete="new-password">
                    </div>
                    <div class="field">
                        <label>Yeni Şifre Tekrar</label>
                        <input type="password" id="newPw2" placeholder="Yeni şifrenizi tekrar girin" autocomplete="new-password">
                    </div>
                </div>
                <div class="toast" id="pwToast"></div>
                <button type="submit" class="save-btn" id="pwBtn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                    Şifreyi Güncelle
                </button>
            </form>
        </div>
    </div>

    <!-- Session card -->
    <div class="acc-card">
        <div class="acc-card-head">
            <h2>
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                Oturum
            </h2>
        </div>
        <div class="acc-card-body">
            <div class="danger-zone">
                <p><strong>Oturumu Kapat</strong><br>Hesabınızdan güvenli şekilde çıkış yapın.</p>
                <a href="/logout" class="save-btn" style="background:rgba(239,68,68,0.12);color:#f87171;border:1px solid rgba(239,68,68,0.25);text-decoration:none;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    Çıkış Yap
                </a>
            </div>
        </div>
    </div>
</div>

<script>
function showToast(id, msg, type) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.className = 'toast ' + type;
    el.style.display = 'block';
    setTimeout(() => { el.style.display = 'none'; }, 3500);
}

document.getElementById('profileForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('profileBtn');
    btn.disabled = true;
    try {
        const res = await fetch('/account', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                action: 'update_profile',
                full_name: document.getElementById('fullName').value.trim(),
                company:   document.getElementById('company').value.trim(),
                phone:     document.getElementById('phone').value.trim(),
            })
        });
        const data = await res.json();
        if (res.ok && data.success) {
            showToast('profileToast', 'Profil güncellendi.', 'success');
        } else {
            showToast('profileToast', data.error || 'Bir hata oluştu.', 'error');
        }
    } catch {
        showToast('profileToast', 'Bağlantı hatası.', 'error');
    }
    btn.disabled = false;
});

document.getElementById('passwordForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn   = document.getElementById('pwBtn');
    const curPw = document.getElementById('curPw').value;
    const newPw = document.getElementById('newPw').value;
    const newPw2= document.getElementById('newPw2').value;

    if (!curPw) { showToast('pwToast', 'Mevcut şifreyi girin.', 'error'); return; }
    if (newPw.length < 8) { showToast('pwToast', 'Yeni şifre en az 8 karakter olmalıdır.', 'error'); return; }
    if (newPw !== newPw2) { showToast('pwToast', 'Yeni şifreler eşleşmiyor.', 'error'); return; }

    btn.disabled = true;
    try {
        const res = await fetch('/account', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                action: 'change_password',
                current_password: curPw,
                new_password: newPw,
            })
        });
        const data = await res.json();
        if (res.ok && data.success) {
            showToast('pwToast', 'Şifre başarıyla güncellendi.', 'success');
            document.getElementById('curPw').value = '';
            document.getElementById('newPw').value = '';
            document.getElementById('newPw2').value = '';
        } else {
            showToast('pwToast', data.error || 'Bir hata oluştu.', 'error');
        }
    } catch {
        showToast('pwToast', 'Bağlantı hatası.', 'error');
    }
    btn.disabled = false;
});
</script>
</body>
</html>
