<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/static/logo.png">
    <script src="/static/app_i18n.js"></script>
    <title>Register — Yo Scraper</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #060609; color: #fff;
            min-height: 100vh; overflow-x: hidden;
        }
        .page-wrap {
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: flex-start;
            padding: 40px 16px 80px; position: relative; overflow: hidden;
        }
        canvas {
            position: fixed; inset: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }
        .card-wrap { width: 100%; max-width: 460px; position: relative; z-index: 10; }
        .logo-wrap { display: flex; justify-content: center; margin-bottom: 20px; }
        .logo-wrap a { display: block; }
        .logo-wrap img { width: 56px; height: 56px; border-radius: 14px; }

        .card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.10);
            border-radius: 20px; padding: 32px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .card h1 { font-size: 24px; font-weight: 700; color: #fff; text-align: center; margin-bottom: 8px; }
        .card .subtitle { font-size: 14px; color: #9ca3af; text-align: center; margin-bottom: 24px; }

        .error-box {
            margin-bottom: 20px; border-radius: 10px;
            background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2);
            padding: 12px 16px;
        }
        .error-box p { font-size: 14px; color: #f87171; }

        .form-grid { display: flex; flex-direction: column; gap: 20px; }
        .field label {
            display: block; font-size: 14px; font-weight: 500; color: #d1d5db; margin-bottom: 6px;
        }
        .field label .req { color: #34d399; }
        .field input {
            width: 100%; border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.10);
            background: rgba(255,255,255,0.04);
            padding: 9px 12px; font-size: 14px; color: #fff;
            font-family: inherit; outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .field input::placeholder { color: #6b7280; }
        .field input:focus {
            border-color: rgba(16,185,129,0.5);
            box-shadow: 0 0 0 3px rgba(16,185,129,0.15);
        }

        .terms-row { display: flex; align-items: flex-start; gap: 12px; cursor: pointer; }
        .terms-row input[type="checkbox"] {
            width: 16px; height: 16px; margin-top: 2px; flex-shrink: 0;
            accent-color: #10b981; cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.04);
        }
        .terms-row span { font-size: 14px; color: #9ca3af; line-height: 1.5; }
        .terms-row a { color: #34d399; text-decoration: underline; }
        .terms-row a:hover { color: #6ee7b7; }

        .submit-btn {
            width: 100%; padding: 10px 16px;
            border-radius: 10px; border: none; cursor: pointer;
            background: linear-gradient(90deg, #10b981, #14b8a6);
            color: #000; font-size: 14px; font-weight: 600;
            font-family: inherit;
            box-shadow: 0 8px 24px rgba(16,185,129,0.2);
            transition: all 0.2s;
        }
        .submit-btn:hover { background: linear-gradient(90deg, #059669, #0f766e); }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .no-card { font-size: 12px; color: #4b5563; text-align: center; margin-top: 16px; }

        .login-link { margin-top: 16px; text-align: center; }
        .login-link p { font-size: 14px; color: #6b7280; }
        .login-link a { color: #34d399; text-decoration: none; font-weight: 500; transition: color 0.2s; }
        .login-link a:hover { color: #6ee7b7; }

        .back-link { margin-top: 20px; text-align: center; }
        .back-link a { font-size: 14px; color: #6b7280; text-decoration: none; transition: color 0.2s; }
        .back-link a:hover { color: #34d399; }

        .footer-legal {
            margin-top: 16px; margin-bottom: 8px;
            display: flex; flex-wrap: wrap; justify-content: center; gap: 16px;
            position: relative; z-index: 10;
        }
        .footer-legal a { font-size: 12px; color: #374151; text-decoration: none; transition: color 0.2s; }
        .footer-legal a:hover { color: #9ca3af; }
    </style>
</head>
<body>
<div class="page-wrap">
    <canvas id="bgCanvas" aria-hidden="true"></canvas>

    <div class="card-wrap">
        <div class="logo-wrap">
            <a href="/"><img src="/static/logo.png" alt="Yo Scraper"></a>
        </div>

        <div class="card">
            <h1 data-i18n="reg-title">Kayıt Ol</h1>
            <p class="subtitle" data-i18n="reg-subtitle">Yo Scraper'a ücretsiz kaydolun</p>

            <div class="error-box" id="errorBox" style="display:none;">
                <p id="errorMsg"></p>
            </div>

            <form id="registerForm">
                <div class="form-grid">
                    <div class="field">
                        <label><span data-i18n="fullname-label">Ad Soyad</span> <span class="req">*</span></label>
                        <input type="text" id="name" placeholder="Ahmet Yılmaz" data-i18n-ph="fullname-ph" autocomplete="name">
                    </div>
                    <div class="field">
                        <label><span data-i18n="email-label">E-posta</span> <span class="req">*</span></label>
                        <input type="email" id="email" placeholder="ornek@sirket.com" data-i18n-ph="email-ph" autocomplete="email">
                    </div>
                    <div class="field">
                        <label data-i18n="company-label">Şirket</label>
                        <input type="text" id="company" placeholder="Şirket adı (opsiyonel)" data-i18n-ph="company-ph" autocomplete="organization">
                    </div>
                    <div class="field">
                        <label data-i18n="phone-label">Telefon</label>
                        <input type="tel" id="phone" placeholder="+90 555 000 00 00" autocomplete="tel">
                    </div>
                    <div class="field">
                        <label><span data-i18n="pw-new-label">Şifre</span> <span class="req">*</span></label>
                        <input type="password" id="password" placeholder="En az 8 karakter" data-i18n-ph="pw-new-ph" autocomplete="new-password">
                    </div>
                    <div class="field">
                        <label><span data-i18n="pw-confirm-label">Şifre Tekrar</span> <span class="req">*</span></label>
                        <input type="password" id="passwordConfirm" placeholder="Şifrenizi tekrar girin" data-i18n-ph="pw-confirm-ph" autocomplete="new-password">
                    </div>

                    <label class="terms-row">
                        <input type="checkbox" id="acceptTerms">
                        <span id="termsSpan">
                            <a href="/en/privacy-policy" target="_blank" data-i18n="terms-pp">Gizlilik Politikası</a> ve
                            <a href="/en/terms-of-service" target="_blank" data-i18n="terms-tos">Kullanım Koşulları</a>'nı okudum, kabul ediyorum.
                        </span>
                    </label>

                    <button type="submit" class="submit-btn" id="submitBtn" data-i18n="reg-btn">Kayıt Ol</button>
                </div>
            </form>

            <p class="no-card" data-i18n="no-cc">Kredi kartı gerekmez.</p>

            <div class="login-link">
                <p><span data-i18n="have-account">Zaten hesabınız var mı?</span> <a href="/login" data-i18n="login-link">Giriş Yap</a></p>
            </div>
        </div>

        <div class="back-link">
            <a href="/" data-i18n="back-home">← Ana Sayfaya Dön</a>
        </div>

        <div class="footer-legal">
            <a href="/en/privacy-policy">Privacy Policy</a>
            <a href="/en/terms-of-service">Terms of Service</a>
        </div>
    </div>
</div>

<script>
// Canvas network animation
(function() {
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    let w, h;
    const nodes = [];
    const pulses = [];

    function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    for (let i = 0; i < 40; i++) {
        nodes.push({
            x: Math.random() * window.innerWidth,
            y: Math.random() * window.innerHeight,
            vx: (Math.random() - 0.5) * 0.3,
            vy: (Math.random() - 0.5) * 0.3,
            r: Math.random() * 2 + 1.5
        });
    }

    function draw() {
        ctx.clearRect(0, 0, w, h);

        for (let i = 0; i < nodes.length; i++) {
            const n = nodes[i];
            n.x += n.vx; n.y += n.vy;
            if (n.x < 0 || n.x > w) n.vx *= -1;
            if (n.y < 0 || n.y > h) n.vy *= -1;
            n.x = Math.max(0, Math.min(w, n.x));
            n.y = Math.max(0, Math.min(h, n.y));
        }

        for (let i = 0; i < nodes.length; i++) {
            for (let j = i + 1; j < nodes.length; j++) {
                const dx = nodes[i].x - nodes[j].x;
                const dy = nodes[i].y - nodes[j].y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 180) {
                    const alpha = (1 - dist / 180) * 0.35;
                    ctx.beginPath();
                    ctx.moveTo(nodes[i].x, nodes[i].y);
                    ctx.lineTo(nodes[j].x, nodes[j].y);
                    ctx.strokeStyle = 'rgba(255,255,255,' + alpha + ')';
                    ctx.lineWidth = 0.8;
                    ctx.stroke();
                    if (Math.random() < 0.008 && pulses.length < 15) {
                        pulses.push({ from: i, to: j, t: 0, speed: 0.008 + Math.random() * 0.008 });
                    }
                }
            }
        }

        for (let p = pulses.length - 1; p >= 0; p--) {
            const pulse = pulses[p];
            pulse.t += pulse.speed;
            if (pulse.t > 1) { pulses.splice(p, 1); continue; }
            const from = nodes[pulse.from], to = nodes[pulse.to];
            const px = from.x + (to.x - from.x) * pulse.t;
            const py = from.y + (to.y - from.y) * pulse.t;
            const glow = Math.sin(pulse.t * Math.PI);
            ctx.beginPath();
            ctx.arc(px, py, 2, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(16,185,129,' + (glow * 0.8) + ')';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(px, py, 5, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(16,185,129,' + (glow * 0.2) + ')';
            ctx.fill();
        }

        for (let i = 0; i < nodes.length; i++) {
            const n = nodes[i];
            ctx.beginPath();
            ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,0.25)';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(n.x, n.y, n.r + 3, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,0.03)';
            ctx.fill();
        }

        requestAnimationFrame(draw);
    }
    draw();
})();

// Register form
document.getElementById('registerForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const company = document.getElementById('company').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const password = document.getElementById('password').value;
    const passwordConfirm = document.getElementById('passwordConfirm').value;
    const acceptTerms = document.getElementById('acceptTerms').checked;

    const errorBox = document.getElementById('errorBox');
    const errorMsg = document.getElementById('errorMsg');
    const btn = document.getElementById('submitBtn');

    errorBox.style.display = 'none';

    if (!name) { errorMsg.textContent = t('reg-name-req', 'Ad soyad gereklidir.'); errorBox.style.display = 'block'; return; }
    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { errorMsg.textContent = t('reg-email-inv', 'Geçerli bir e-posta adresi girin.'); errorBox.style.display = 'block'; return; }
    if (!password || password.length < 8) { errorMsg.textContent = t('reg-pw-short', 'Şifre en az 8 karakter olmalıdır.'); errorBox.style.display = 'block'; return; }
    if (password !== passwordConfirm) { errorMsg.textContent = t('reg-pw-mism', 'Şifreler eşleşmiyor.'); errorBox.style.display = 'block'; return; }
    if (!acceptTerms) { errorMsg.textContent = t('reg-terms-req', 'Kullanım koşullarını kabul etmelisiniz.'); errorBox.style.display = 'block'; return; }

    btn.disabled = true;
    btn.textContent = t('reg-saving', 'Kaydediliyor...');

    try {
        const res = await fetch('/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, email, company, phone, password })
        });
        const data = await res.json();
        if (res.ok && data.success) {
            window.location.href = '/app';
        } else {
            errorMsg.textContent = data.error || t('reg-err', 'Kayıt sırasında bir hata oluştu.');
            errorBox.style.display = 'block';
            btn.disabled = false;
            btn.textContent = t('reg-btn', 'Kayıt Ol');
        }
    } catch (err) {
        errorMsg.textContent = t('login-retry', 'Bir hata oluştu. Lütfen tekrar deneyin.');
        errorBox.style.display = 'block';
        btn.disabled = false;
        btn.textContent = t('reg-btn', 'Kayıt Ol');
    }
});
</script>
</body>
</html>
